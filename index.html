<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>照片流</title>
    <style>
      body {
        background-color: #f8fafc; /* 亮色背景 slate-50 */
        margin: 0;
        overflow: hidden;
      }
      
      @keyframes win11-spin { to { transform: rotate(360deg); } }
      .boot-logo { width: 80px; height: 80px; object-fit: contain; filter: brightness(1.35) saturate(.9); }
      .boot-spinner { width: 24px; height: 24px; box-sizing: border-box; border: 3px solid rgba(148, 163, 184, .28); border-top-color: #fff; border-radius: 50%; animation: win11-spin .8s linear infinite; }

      /* === 全局滚动条样式 === */
      ::-webkit-scrollbar {
        width: 8px;  /* 垂直滚动条宽度 */
        height: 8px; /* 水平滚动条高度 */
      }
      
      /* 滚动条轨道（透明，融入背景） */
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      
      /* 滚动条滑块（浅灰色） */
      ::-webkit-scrollbar-thumb {
        background-color: #cbd5e1; /* Tailwind 的 slate-300 */
        border-radius: 9999px;
        /* 使用边框模拟内边距，让滚动条看起来更细 */
        border: 2px solid #f8fafc; 
      }
      
      /* 鼠标悬停在滑块上时加深一点点 */
      ::-webkit-scrollbar-thumb:hover {
        background-color: #94a3b8; /* Tailwind 的 slate-400 */
      }
      
      /* 如果滚动条在纯白背景的容器里（如侧边栏），边框颜色自动适应为白色 */
      .bg-white ::-webkit-scrollbar-thumb {
        border-color: #ffffff;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased overflow-hidden">
    <div id="root">
      <div style="display:flex; align-items:center; justify-content:center; height:100vh; width:100%; background:#020617; color:#ffffff; position:relative; overflow:hidden;">
        <div style="text-align:center; display:flex; flex-direction:column; gap:1.5rem; align-items:center;">
          <img class="boot-logo" src="./app-logo-dark.svg" alt="照片流" />
          <div style="display:flex; flex-direction:column; gap:.5rem;">
            <h2 style="font-size:1.5rem; font-weight:700; margin:0; background:linear-gradient(to right, #3b82f6, #818cf8); background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent;">照片流</h2>
            <p style="font-size:.875rem; color:#94a3b8; margin:0;">正在启动…</p>
          </div>
          <div class="boot-spinner" aria-label="正在加载"></div>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
